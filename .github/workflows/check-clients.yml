name: Check API clients in sync

on:
  pull_request:
    paths:
      - 'packages/contracts/openapi.yaml'
      - 'packages/contracts/generated/**'
      - 'packages/contracts/package.json'
      - '.github/workflows/check-clients.yml'

permissions:
  contents: read

jobs:
  check-sync:
    name: Generated clients in sync with spec
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pnpm install --frozen-lockfile
      - name: Install oapi-codegen
        run: go install github.com/oapi-codegen/oapi-codegen/v2/cmd/oapi-codegen@latest
      - name: Install openapi-python-client
        run: pip install openapi-python-client
      - name: Generate clients
        run: cd packages/contracts && pnpm gen:all
      - name: Check generated files match committed files
        run: |
          if ! git diff --exit-code packages/contracts/generated/; then
            echo "::error::Generated clients are out of date. Run 'make gen-clients' and commit."
            git diff --stat packages/contracts/generated/
            exit 1
          fi
          echo "Generated clients are in sync."
